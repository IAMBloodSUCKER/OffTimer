name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.14)'
        required: true
        default: '1.0.22'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.ref_type }}' -eq 'tag') {
            $v = '${{ github.ref_name }}' -replace '^v',''
          } else {
            $v = '${{ inputs.version }}'
          }
          "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Building version $v"

      - name: Build icons
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force target/iconbuild | Out-Null
          javac -d target/iconbuild src/main/java/com/offtimer/ui/AppIcon.java src/main/java/com/offtimer/build/IconBuilderMain.java
          java -cp target/iconbuild com.offtimer.build.IconBuilderMain .

      - name: Build JAR
        run: mvn -B package -DskipTests

      - name: Create portable app
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $ErrorActionPreference = 'Stop'

          jpackage `
            --input target `
            --name OffTimer `
            --main-jar offtimer.jar `
            --main-class com.offtimer.MainApp `
            --type app-image `
            --icon src/main/resources/icon.ico `
            --app-version $version `
            --description "PC shutdown timer" `
            --vendor BloodSUCKER `
            --copyright "Copyright (c) BloodSUCKER" `
            --dest dist

          Copy-Item src/main/resources/icon.ico dist/OffTimer/OffTimer.ico -Force
          Copy-Item scripts/CreateShortcut.bat dist/OffTimer/CreateShortcut.bat -Force
          Copy-Item scripts/Uninstall.bat dist/OffTimer/Uninstall.bat -Force

      - name: Sign executable
        if: env.SIGNING_CERT != ''
        shell: pwsh
        env:
          SIGNING_CERT: ${{ secrets.WINDOWS_SIGNING_CERT }}
          SIGNING_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PASSWORD }}
        run: |
          $exe = "dist/OffTimer/OffTimer.exe"
          $pfxPath = "signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:SIGNING_CERT))

          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) { throw "signtool.exe not found" }

          & $signtool sign /f $pfxPath /p $env:SIGNING_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /d "OffTimer" /du "https://github.com/IAMBloodSUCKER/OffTimer" $exe

      - name: Package release exe
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $config = @"
          ;!@Install@!UTF-8!
          Title="OffTimer"
          BeginPrompt="Распаковать OffTimer?"
          ExtractTitle="Подготовка..."
          InstallPath="%USERPROFILE%\OffTimer"
          GUIMode="2"
          RunProgram="OffTimer.exe"
          ;!@InstallEnd@!
          "@
          Set-Content -Path dist/sfx.txt -Value $config -Encoding UTF8

          & "C:\Program Files\7-Zip\7z.exe" a -t7z dist/package.7z "dist/OffTimer/*"

          if (-not (Test-Path "7zextra/7zSD.sfx")) {
            Invoke-WebRequest -Uri "https://www.7-zip.org/a/7z2409-extra.7z" -OutFile 7zextra.7z
            & "C:\Program Files\7-Zip\7z.exe" x 7zextra.7z -o7zextra
          }

          cmd /c copy /b "7zextra\7zSD.sfx" + "dist\sfx.txt" + "dist\package.7z" "dist\OffTimer.exe"
          if ($LASTEXITCODE -ne 0) { throw "Failed to build OffTimer.exe" }

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: dist/OffTimer.exe
          make_latest: true
          generate_release_notes: true
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
