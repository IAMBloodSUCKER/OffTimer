name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.22)'
        required: true
        default: '1.0.26'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.ref_type }}' -eq 'tag') {
            $v = '${{ github.ref_name }}' -replace '^v',''
          } else {
            $v = '${{ inputs.version }}'
          }
          "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Building version $v"

      - name: Build icons
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force target/iconbuild | Out-Null
          javac -d target/iconbuild src/main/java/com/offtimer/ui/AppIcon.java src/main/java/com/offtimer/build/IconBuilderMain.java
          java -cp target/iconbuild com.offtimer.build.IconBuilderMain .

      - name: Build JAR
        run: mvn -B package -DskipTests

      - name: Create installer
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $ErrorActionPreference = 'Stop'

          jpackage `
            --input target `
            --name OffTimer `
            --main-jar offtimer.jar `
            --main-class com.offtimer.MainApp `
            --type exe `
            --icon src/main/resources/icon.ico `
            --app-version $version `
            --description "Таймер выключения ПК" `
            --vendor BloodSUCKER `
            --copyright "BloodSUCKER" `
            --win-shortcut `
            --win-menu `
            --dest dist

          $built = Get-ChildItem dist -Filter "OffTimer-*.exe" | Select-Object -First 1
          if (-not $built) { throw "Installer exe not found in dist" }
          Move-Item $built.FullName dist/OffTimer.exe -Force

      - name: Sign executable
        if: env.SIGNING_CERT != ''
        shell: pwsh
        env:
          SIGNING_CERT: ${{ secrets.WINDOWS_SIGNING_CERT }}
          SIGNING_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PASSWORD }}
        run: |
          $exe = "dist/OffTimer.exe"
          $pfxPath = "signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:SIGNING_CERT))

          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) { throw "signtool.exe not found" }

          & $signtool sign /f $pfxPath /p $env:SIGNING_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /d "OffTimer" /du "https://github.com/IAMBloodSUCKER/OffTimer" $exe

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: dist/OffTimer.exe
          make_latest: true
          generate_release_notes: true
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
