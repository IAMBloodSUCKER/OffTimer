name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build JAR
        run: mvn -B package -DskipTests

      - name: Build Windows icon
        shell: pwsh
        run: ./scripts/build-icon.ps1

      - name: Create portable app
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          if ($version -eq '${{ github.ref_name }}') { $version = '1.0.9' }

          $modules = jdeps --multi-release 17 --print-module-deps --ignore-including-deps -R target/offtimer.jar
          jlink --add-modules $modules --strip-debug --compress zip-6 --no-header-files --no-man-pages --output dist/runtime

          jpackage `
            --runtime-image dist/runtime `
            --input target `
            --name OffTimer `
            --main-jar offtimer.jar `
            --main-class com.offtimer.MainApp `
            --type app-image `
            --icon src/main/resources/icon.ico `
            --app-version $version `
            --description "Таймер выключения, перезагрузки и сна" `
            --vendor BloodSUCKER `
            --copyright "Copyright (c) BloodSUCKER" `
            --dest dist

          Compress-Archive -Path dist/OffTimer -DestinationPath dist/OffTimer-Windows.zip -Force

      - name: Sign executable
        shell: pwsh
        env:
          SIGNING_CERT: ${{ secrets.WINDOWS_SIGNING_CERT }}
          SIGNING_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PASSWORD }}
        run: |
          $exe = "dist/OffTimer/OffTimer.exe"
          $pfxPath = "signing.pfx"
          $pfxPassword = $env:SIGNING_PASSWORD

          if ($env:SIGNING_CERT) {
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:SIGNING_CERT))
          } else {
            $pfxPassword = "offtimer-signing"
            $cert = New-SelfSignedCertificate `
              -Type CodeSigningCert `
              -Subject "CN=BloodSUCKER, O=BloodSUCKER, C=RU" `
              -KeyAlgorithm RSA `
              -KeyLength 4096 `
              -HashAlgorithm SHA256 `
              -KeyUsage DigitalSignature `
              -CertStoreLocation Cert:\CurrentUser\My `
              -NotAfter (Get-Date).AddYears(10) `
              -FriendlyName "BloodSUCKER"
            Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password (ConvertTo-SecureString $pfxPassword -AsPlainText -Force) | Out-Null
          }

          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) {
            throw "signtool.exe not found"
          }

          & $signtool sign /f $pfxPath /p $pfxPassword /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /d "OffTimer" /du "https://github.com/IAMBloodSUCKER/OffTimer" $exe
          & $signtool verify /pa /v $exe

          Remove-Item dist/OffTimer-Windows.zip -ErrorAction SilentlyContinue
          Compress-Archive -Path dist/OffTimer -DestinationPath dist/OffTimer-Windows.zip -Force

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/OffTimer-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-jar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build JAR
        run: mvn -B package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: offtimer-jar
          path: target/offtimer.jar
