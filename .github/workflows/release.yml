name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.14)'
        required: true
        default: '1.0.18'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.ref_type }}' -eq 'tag') {
            $v = '${{ github.ref_name }}' -replace '^v',''
          } else {
            $v = '${{ inputs.version }}'
          }
          "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Building version $v"

      - name: Build icons
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force target/iconbuild | Out-Null
          javac -d target/iconbuild src/main/java/com/offtimer/ui/AppIcon.java src/main/java/com/offtimer/build/IconBuilderMain.java
          java -cp target/iconbuild com.offtimer.build.IconBuilderMain .

      - name: Build JAR
        run: mvn -B package -DskipTests

      - name: Create portable app
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $ErrorActionPreference = 'Stop'

          jpackage `
            --input target `
            --name OffTimer `
            --main-jar offtimer.jar `
            --main-class com.offtimer.MainApp `
            --type app-image `
            --icon src/main/resources/icon.ico `
            --app-version $version `
            --description "PC shutdown timer" `
            --vendor BloodSUCKER `
            --copyright "Copyright (c) BloodSUCKER" `
            --dest dist

          Invoke-WebRequest -Uri "https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe" -OutFile rcedit.exe
          $exe = "dist/OffTimer/OffTimer.exe"
          ./rcedit.exe $exe --set-icon src/main/resources/icon.ico
          if ($LASTEXITCODE -ne 0) { throw "rcedit failed with exit code $LASTEXITCODE" }

          Copy-Item src/main/resources/icon.ico dist/OffTimer/OffTimer.ico -Force
          Copy-Item scripts/CreateShortcut.bat dist/OffTimer/CreateShortcut.bat -Force
          Copy-Item scripts/Uninstall.bat dist/OffTimer/Uninstall.bat -Force

          Compress-Archive -Path dist/OffTimer -DestinationPath dist/OffTimer-Windows.zip -Force

      - name: Sign executable
        if: env.SIGNING_CERT != ''
        shell: pwsh
        env:
          SIGNING_CERT: ${{ secrets.WINDOWS_SIGNING_CERT }}
          SIGNING_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PASSWORD }}
        run: |
          $exe = "dist/OffTimer/OffTimer.exe"
          $pfxPath = "signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:SIGNING_CERT))

          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) { throw "signtool.exe not found" }

          & $signtool sign /f $pfxPath /p $env:SIGNING_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /d "OffTimer" /du "https://github.com/IAMBloodSUCKER/OffTimer" $exe
          Remove-Item dist/OffTimer-Windows.zip -ErrorAction SilentlyContinue
          Compress-Archive -Path dist/OffTimer -DestinationPath dist/OffTimer-Windows.zip -Force

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: dist/OffTimer-Windows.zip
          make_latest: true
          generate_release_notes: true
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
